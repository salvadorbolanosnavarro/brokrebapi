<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AVM — Opinión de Valor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0; color: #1a1a1a;
      min-height: 100vh; padding: 32px 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .badge {
      display: inline-block; background: #e8f5ee; color: #1D9E75;
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; margin-bottom: 10px; letter-spacing: .06em;
    }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
    .subtitulo { font-size: 14px; color: #666; margin-bottom: 28px; }
    .card {
      background: #fff; border-radius: 14px; padding: 24px;
      margin-bottom: 20px; border: 1px solid #e8e8e4;
    }
    .cred-toggle {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      font-size: 13px; font-weight: 600; color: #555; user-select: none;
    }
    .cred-toggle .arrow { transition: transform .2s; font-size: 11px; }
    .cred-toggle.open .arrow { transform: rotate(90deg); }
    .cred-body {
      display: none; margin-top: 16px; padding-top: 16px;
      border-top: 1px solid #f0f0ec;
    }
    .cred-body.visible { display: block; }
    .cred-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 540px) { .cred-row { grid-template-columns: 1fr; } }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px; }
    @media (max-width: 540px) { .form-row { grid-template-columns: 1fr; } }
    .field label {
      display: block; font-size: 11px; font-weight: 700; color: #555;
      margin-bottom: 6px; letter-spacing: .04em; text-transform: uppercase;
    }
    .field input {
      width: 100%; padding: 10px 13px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px; color: #111;
      background: #fafaf8; outline: none; transition: border-color .2s;
    }
    .field input:focus { border-color: #1D9E75; background: #fff; }
    .btn-primary {
      padding: 10px 18px; background: #1D9E75; color: #fff;
      font-size: 13px; font-weight: 600; border: none;
      border-radius: 8px; cursor: pointer; transition: background .15s;
    }
    .btn-primary:hover { background: #178a65; }
    .btn-buscar {
      width: 100%; padding: 12px; background: #1D9E75; color: #fff;
      font-size: 15px; font-weight: 600; border: none;
      border-radius: 8px; cursor: pointer; transition: background .15s;
    }
    .btn-buscar:hover { background: #178a65; }
    .btn-buscar:disabled { background: #aaa; cursor: not-allowed; }
    .aviso { font-size: 11px; color: #aaa; margin-top: 8px; }
    .loading { display: none; text-align: center; padding: 36px; color: #666; font-size: 14px; }
    .spinner {
      width: 34px; height: 34px; border: 3px solid #e0e0e0;
      border-top-color: #1D9E75; border-radius: 50%;
      margin: 0 auto 14px; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box {
      display: none; background: #fff3f3; border: 1px solid #f5c0c0;
      border-radius: 10px; padding: 14px 18px; color: #c0392b;
      font-size: 13px; margin-bottom: 18px; line-height: 1.6;
    }
    .resumen {
      display: none; background: #e8f5ee; border-radius: 10px;
      padding: 12px 18px; margin-bottom: 18px;
      font-size: 14px; color: #0f6e56; font-weight: 500;
    }
    .table-wrap {
      display: none; overflow-x: auto; border-radius: 12px;
      border: 1px solid #e8e8e4; margin-bottom: 16px;
    }
    table { width: 100%; border-collapse: collapse; background: #fff; font-size: 13px; }
    thead { background: #f5f5f0; }
    th {
      text-align: left; padding: 10px 13px; font-size: 11px;
      font-weight: 700; color: #666; letter-spacing: .05em;
      text-transform: uppercase; border-bottom: 1px solid #e8e8e4; white-space: nowrap;
    }
    td { padding: 11px 13px; border-bottom: 1px solid #f0f0ec; color: #222; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafaf8; }
    .precio { font-weight: 700; color: #1D9E75; white-space: nowrap; }
    .metros { color: #555; }
    .url-link { color: #1D9E75; text-decoration: none; font-size: 12px; }
    .url-link:hover { text-decoration: underline; }
    .snippet { color: #666; font-size: 12px; line-height: 1.5; }
    .no-dato { color: #ccc; font-style: italic; }
    .btn-csv {
      display: none; padding: 9px 18px; background: #fff;
      border: 1.5px solid #1D9E75; color: #1D9E75;
      font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer;
    }
    .btn-csv:hover { background: #e8f5ee; }
  </style>
</head>
<body>
<div class="container">

  <div>
    <span class="badge">AVM · OPINIÓN DE VALOR</span>
    <h1>Comparables de zona</h1>
    <p class="subtitulo">Busca propiedades en venta dentro de una colonia específica.</p>
  </div>


  <!-- Búsqueda -->
  <div class="card">

  <div class="form-row">
    <div class="field">
      <label>Ciudad</label>
      <input type="text" id="ciudad" placeholder="Ej. Morelia">
    </div>

    <div class="field">
      <label>Estado</label>
      <input type="text" id="estado" placeholder="Ej. Michoacán">
    </div>
  </div>

  <div class="form-row">
    <div class="field">
      <label>Colonia</label>
      <input type="text" id="colonia" placeholder="Ej. Altozano">
    </div>

    <div class="field">
      <label>Tipo de inmueble</label>
      <select id="tipo">
        <option value="casa">Casa</option>
        <option value="departamento">Departamento</option>
        <option value="terreno">Terreno</option>
      </select>
    </div>
  </div>

  <div class="form-row">
    <div class="field">
      <label>m² terreno</label>
      <input type="number" id="m2t" placeholder="Ej. 160">
    </div>

    <div class="field">
      <label>m² construcción (opcional)</label>
      <input type="number" id="m2c" placeholder="Ej. 220">
    </div>
  </div>

  <button class="btn-buscar" id="btn-buscar" onclick="buscar()">Buscar comparables</button>

</div>
  <!-- Estado -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    Consultando Google… esto tarda unos segundos.
  </div>
  <div class="error-box" id="error-box"></div>
  <div class="resumen"   id="resumen"></div>

  <!-- Resultados -->
  <div class="table-wrap" id="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Propiedad</th>
          <th>Precio</th>
          <th>Terreno m²</th>
          <th>Construcción m²</th>
          <th>Fuente</th>
        </tr>
      </thead>
      <tbody id="tabla-body"></tbody>
    </table>
  </div>
  <button class="btn-csv" id="btn-csv" onclick="descargarCSV()">⬇ Descargar CSV</button>

</div>

<script>

// ── Regex ─────────────────────────────────────
function limpiarNum(t) {
  try { return parseFloat(t.replace(/,/g,'').trim()); } catch(e) { return null; }
}
function extraerPrecio(texto) {
  const pats = [/\$\s*([\d,\.]+)/, /([\d,\.]+)\s*millones?/i];
  for (const p of pats) {
    const m = texto.match(p);
    if (m) {
      let v = limpiarNum(m[1]);
      if (!v) continue;
      const ctx = texto.slice(Math.max(0, texto.search(p) - 5), texto.search(p) + 20);
      if (/millon/i.test(ctx)) return v * 1_000_000;
      return v < 1000 ? v * 1000 : v;
    }
  }
  return null;
}
function extraerMetros(texto) {
  let m2t = null, m2c = null;
  const mt = texto.match(/([\d,\.]+)\s*m[²2]?\s*(?:de\s*)?terreno/i);
  const mc = texto.match(/([\d,\.]+)\s*m[²2]?\s*(?:de\s*)?(?:construcci[oó]n|construcc?\.?)/i);
  if (mt) m2t = limpiarNum(mt[1]);
  if (mc) m2c = limpiarNum(mc[1]);
  if (!m2t && !m2c) {
    const mg = texto.match(/([\d,\.]+)\s*m[²2]/i);
    if (mg) m2t = limpiarNum(mg[1]);
  }
  return [m2t, m2c];
}

// ── Búsqueda ──────────────────────────────────
let resultadosGlobales = [];

async function buscar() {
  const colonia = document.getElementById('colonia').value.trim();
  const ciudad  = document.getElementById('ciudad').value.trim();

  if (!colonia || !ciudad) {
    mostrarError('Ingresa la colonia/fraccionamiento y la ciudad.');
    return;
  }

  ocultarTodo();
  document.getElementById('btn-buscar').disabled = true;
  document.getElementById('loading').style.display = 'block';

  const query = `"venta" "casa" "${colonia}" "${ciudad}" "$"`;
  const url = `https://www.googleapis.com/customsearch/v1?key=${apiKey}&cx=${cx}&q=${encodeURIComponent(query)}&num=10&lr=lang_es`;

  try {
    const resp = await fetch(url);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err?.error?.message || `Error ${resp.status}`);
    }
    const data  = await resp.json();
    const items = data.items || [];
    resultadosGlobales = [];

    for (const item of items) {
      const titulo  = item.title   || '';
      const enlace  = item.link    || '';
      const snippet = item.snippet || '';
      const texto   = `${titulo} ${snippet}`;
      if (!texto.toLowerCase().includes(colonia.toLowerCase())) continue;
      const precio      = extraerPrecio(texto);
      const [m2t, m2c] = extraerMetros(texto);
      resultadosGlobales.push({ titulo, url: enlace, snippet, precio_mxn: precio, m2_terreno: m2t, m2_construccion: m2c });
    }

    mostrarResultados(colonia);
  } catch(err) {
    mostrarError(
      `No se pudo completar la búsqueda.<br><small style="opacity:.8">${err.message}</small><br><br>
      <small>
        <strong>Pasos para resolverlo:</strong><br>
        1. Ve a <a href="https://console.cloud.google.com/apis/library/customsearch.googleapis.com" target="_blank" style="color:#1D9E75">Google Cloud Console</a><br>
        2. Busca <strong>"Custom Search JSON API"</strong> y haz clic en <strong>"Habilitar"</strong><br>
        3. Verifica que tu API Key corresponde al mismo proyecto donde habilitaste la API<br>
        4. En "Configurar credenciales de Google" arriba, vuelve a guardar tu API Key y Search Engine ID
      </small>`
    );
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('btn-buscar').disabled = false;
  }
}

function mostrarResultados(colonia) {
  if (!resultadosGlobales.length) {
    mostrarError(`No se encontraron propiedades en <strong>${colonia}</strong>. Intenta con otro nombre de zona.`);
    return;
  }
  const n = resultadosGlobales.length;
  document.getElementById('resumen').innerHTML =
    `✓ <strong>${n}</strong> propiedad${n !== 1 ? 'es' : ''} encontrada${n !== 1 ? 's' : ''} en <strong>${colonia}</strong>.`;
  document.getElementById('resumen').style.display = 'block';

  const tbody = document.getElementById('tabla-body');
  tbody.innerHTML = '';
  for (const p of resultadosGlobales) {
    const precio  = p.precio_mxn       ? `$${Number(p.precio_mxn).toLocaleString('es-MX')} MXN` : '<span class="no-dato">No detectado</span>';
    const terreno = p.m2_terreno       ? `${Number(p.m2_terreno).toLocaleString('es-MX')} m²`   : '<span class="no-dato">—</span>';
    const constr  = p.m2_construccion  ? `${Number(p.m2_construccion).toLocaleString('es-MX')} m²` : '<span class="no-dato">—</span>';
    tbody.innerHTML += `
      <tr>
        <td><div style="font-weight:600;margin-bottom:4px">${p.titulo}</div><div class="snippet">${p.snippet}</div></td>
        <td class="precio">${precio}</td>
        <td class="metros">${terreno}</td>
        <td class="metros">${constr}</td>
        <td><a href="${p.url}" target="_blank" class="url-link">Ver anuncio ↗</a></td>
      </tr>`;
  }
  document.getElementById('table-wrap').style.display = 'block';
  document.getElementById('btn-csv').style.display = 'inline-block';
}

// ── CSV ───────────────────────────────────────
function descargarCSV() {
  if (!resultadosGlobales.length) return;
  const headers = ['titulo','url','precio_mxn','m2_terreno','m2_construccion','snippet'];
  const filas = [headers.join(','), ...resultadosGlobales.map(p =>
    headers.map(h => `"${String(p[h] ?? '').replace(/"/g,'""')}"`).join(',')
  )];
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([filas.join('\n')], { type: 'text/csv;charset=utf-8;' })),
    download: `comparables_${Date.now()}.csv`
  });
  a.click();
}

// ── UI helpers ────────────────────────────────
function mostrarError(msg) {
  const el = document.getElementById('error-box');
  el.innerHTML = `⚠️ ${msg}`;
  el.style.display = 'block';
}
function ocultarTodo() {
  ['error-box','resumen','table-wrap'].forEach(id =>
    document.getElementById(id).style.display = 'none');
  document.getElementById('btn-csv').style.display = 'none';
}
['colonia','ciudad'].forEach(id =>
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') buscar(); })
);

</script>
</body>
</html>
