<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brokr — Ficha Técnica</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<style>
/* ─── VARIABLES ─────────────────────────────── */
:root{
  --navy:#0f1829;
  --navy2:#1a2744;
  --teal:#2a9db5;
  --gold:#c9a84c;
  --white:#ffffff;
  --gray:#f5f6f8;
  --gray2:#e8ecf2;
  --txt:#1a2744;
  --mut:#6b7a99;
  --r:12px;
}

/* ─── RESET ──────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f0f2f5;color:var(--txt)}

/* ─── APP UI ─────────────────────────────────── */
#app-ui{
  max-width:520px;margin:0 auto;padding:28px 20px 60px;
}
.ui-logo{margin-bottom:28px}
.ui-logo img{height:28px}
.ui-card{background:var(--white);border-radius:var(--r);padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px}
.ui-card h2{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:6px}
.ui-card p{font-size:13px;color:var(--mut);margin-bottom:18px;line-height:1.5}
.ui-input-row{display:flex;gap:10px}
.ui-input{
  flex:1;padding:11px 14px;border:1.5px solid var(--gray2);border-radius:10px;
  font-size:14px;font-family:'DM Sans',sans-serif;color:var(--txt);outline:none;
  transition:border-color .15s;
}
.ui-input:focus{border-color:var(--teal)}
.ui-btn{
  display:flex;align-items:center;gap:7px;padding:11px 20px;
  background:var(--navy);color:var(--white);border:none;border-radius:10px;
  font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;
  transition:background .15s;white-space:nowrap;
}
.ui-btn:hover{background:var(--navy2)}
.ui-btn.teal{background:var(--teal)}
.ui-btn.teal:hover{background:#1f8ba0}
#print-bar{
  display:none;background:var(--white);border-radius:var(--r);
  padding:16px 20px;box-shadow:0 2px 12px rgba(0,0,0,.06);
  margin-bottom:16px;flex-direction:row;align-items:center;
  justify-content:space-between;gap:12px;
}
#print-bar.show{display:flex}
#print-bar span{font-size:13px;color:var(--mut)}
.ui-error{
  background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;
  padding:12px 16px;font-size:13px;color:#dc2626;margin-top:12px;display:none;
}
.ui-loading{
  display:none;flex-direction:column;align-items:center;
  justify-content:center;padding:40px;gap:12px;
}
.ui-loading.show{display:flex}
.spinner{
  width:32px;height:32px;border:3px solid var(--gray2);
  border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ui-loading p{font-size:13px;color:var(--mut)}
#back-btn{display:none;margin-bottom:12px}
#back-btn.show{display:flex}

/* ─── FICHA (preview container) ─────────────── */
#ficha{display:none;margin-bottom:40px}
#ficha.show{display:block}

/* ═══════════════════════════════════════════════
   FICHA PAGE — A4 exact
═══════════════════════════════════════════════ */
.ficha-page{
  width:210mm;
  background:var(--white);
  margin:0 auto 24px;
  box-shadow:0 4px 32px rgba(0,0,0,.10);
  display:flex;
  flex-direction:column;
  position:relative;
  overflow:hidden;
}

/* ─── COVER (page 1) ─────────────────────────── */
.cover-hero{
  width:100%;
  height:110mm;
  object-fit:cover;
  display:block;
  flex-shrink:0;
}
.cover-hero-placeholder{
  width:100%;height:110mm;
  background:linear-gradient(135deg,var(--navy),var(--navy2));
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.cover-info{
  padding:20px 24px 16px;
  border-bottom:1px solid var(--gray2);
}
.cover-badge{
  display:inline-block;
  background:var(--gold);color:var(--white);
  font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  padding:4px 10px;border-radius:20px;margin-bottom:10px;
}
.cover-precio{
  font-family:'Playfair Display',serif;
  font-size:30px;font-weight:700;color:var(--navy);
  line-height:1;margin-bottom:6px;
}
.cover-titulo{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:4px}
.cover-ubicacion{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:4px}

/* specs strip */
.cover-specs{
  display:grid;grid-template-columns:repeat(4,1fr);
  border-bottom:1px solid var(--gray2);
}
.spec-item{
  padding:12px 16px;text-align:center;
  border-right:1px solid var(--gray2);
}
.spec-item:last-child{border-right:none}
.spec-ico{font-size:18px;margin-bottom:3px}
.spec-val{font-size:16px;font-weight:700;color:var(--navy);line-height:1.1}
.spec-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-top:2px}

/* description */
.cover-desc-wrap{padding:16px 24px;flex:1}
.cover-desc-ttl{
  font-family:'Playfair Display',serif;
  font-size:13px;font-weight:600;color:var(--navy);
  margin-bottom:8px;padding-bottom:6px;
  border-bottom:2px solid var(--teal);display:inline-block;
}
.cover-desc{
  font-size:11.5px;color:#444;line-height:1.65;
}

/* ─── GALLERY PAGES ──────────────────────────── */
.gallery-header{
  padding:16px 24px 12px;
  border-bottom:1px solid var(--gray2);
}
.gallery-header h2{
  font-family:'Playfair Display',serif;
  font-size:16px;font-weight:600;color:var(--navy);
}
.photo-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:82mm 82mm 82mm;
  gap:3px;
  padding:3px;
  height:246mm;
  overflow:hidden;
  flex-shrink:0;
}
.photo-grid img{
  width:100%;height:100%;object-fit:cover;display:block;
}

/* ─── CARACTERÍSTICAS PAGE ───────────────────── */
.chars-header{
  padding:18px 24px 14px;
  border-bottom:1px solid var(--gray2);
}
.chars-header h2{
  font-family:'Playfair Display',serif;
  font-size:16px;font-weight:600;color:var(--navy);
}
.chars-body{padding:16px 24px;flex:1}
.char-table{width:100%;border-collapse:collapse}
.char-table tr{border-bottom:1px solid var(--gray2)}
.char-table tr:last-child{border-bottom:none}
.char-table td{padding:8px 12px;font-size:12px;vertical-align:middle}
.char-table td:first-child{color:var(--mut);width:42%;font-weight:400}
.char-table td:last-child{color:var(--navy);font-weight:600;text-align:right}
.char-table tr:nth-child(even) td{background:var(--gray)}

.amen-section{margin-top:16px}
.amen-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--teal);margin-bottom:8px}
.amen-grid{display:flex;flex-wrap:wrap;gap:6px}
.amen-item{
  font-size:11px;padding:5px 10px;
  background:var(--gray);border-radius:20px;color:var(--navy);
  border:1px solid var(--gray2);
}

/* ─── FOOTER ─────────────────────────────────── */
.ficha-footer{
  width:100%;height:40px;
  background:var(--navy);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  flex-shrink:0;
}
.ft-logo img{height:16px;filter:brightness(10)}
.ft-id{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.5px}

/* ─── PRINT ──────────────────────────────────── */
@media print{
  *{
    -webkit-print-color-adjust:exact!important;
    print-color-adjust:exact!important;
  }
  html,body{margin:0;padding:0;background:white}
  #app-ui{display:none!important}
  #ficha{display:block!important;margin:0!important}
  .ficha-page{
    width:210mm!important;
    height:297mm!important;
    margin:0!important;
    padding:0!important;
    box-shadow:none!important;
    page-break-after:always!important;
    page-break-inside:avoid!important;
    display:flex!important;
    flex-direction:column!important;
    overflow:hidden!important;
    position:relative!important;
  }
  .ficha-page:last-child{page-break-after:avoid!important}
  .cover-hero,.cover-hero-placeholder{height:110mm!important}
  .photo-grid{
    display:grid!important;
    grid-template-columns:1fr 1fr!important;
    grid-template-rows:82mm 82mm 82mm!important;
    gap:3px!important;
    padding:3px!important;
    flex-shrink:0!important;
    height:246mm!important;
    overflow:hidden!important;
  }
  .photo-grid img{width:100%!important;height:100%!important;object-fit:cover!important}
  .chars-body{overflow:hidden!important}
  .cover-desc-wrap{overflow:hidden!important}
  .ficha-footer{
    height:40px!important;
    flex-shrink:0!important;
    background:var(--navy)!important;
  }
  .ft-logo img{filter:brightness(10)!important}
  @page{size:A4 portrait;margin:0}
}

/* ─── MOBILE ─────────────────────────────────── */
@media(max-width:768px){
  #app-ui{padding:20px 16px 40px}
  .ui-input-row{flex-direction:column}
  .ficha-page{width:100%;margin-bottom:12px}
  .cover-hero,.cover-hero-placeholder{height:55vw}
  .cover-specs{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<script>
const API = 'https://brokrebapi-production.up.railway.app';

function g(id){ return document.getElementById(id); }

function fmt(n){
  if(!n && n!==0) return '—';
  return '$' + new Intl.NumberFormat('es-MX',{minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
}
function fmtM2(n){
  if(!n) return '—';
  return new Intl.NumberFormat('es-MX').format(n) + ' m²';
}

function setLoading(show, txt='Cargando...'){
  const el = g('loading');
  if(show){ el.classList.add('show'); g('loading-txt').textContent = txt; }
  else    { el.classList.remove('show'); }
}
function showError(msg){ const e=g('err-msg'); e.textContent=msg; e.style.display='block'; }

// ── IMAGE → BASE64 via Railway proxy ─────────────────
async function imgToBase64(url) {
  if(!url) return null;
  try {
    const proxyUrl = `https://brokrebapi-production.up.railway.app/img?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxyUrl);
    if(!res.ok) return url; // fallback to original URL
    const blob = await res.blob();
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.onerror  = () => resolve(url);
      reader.readAsDataURL(blob);
    });
  } catch(e) {
    return url; // fallback
  }
}

async function convertAllImages(fotos) {
  const MAX = 30; // cap to avoid memory issues
  const limited = fotos.slice(0, MAX);
  const converted = await Promise.all(
    limited.map(async (f) => {
      const url = f.url || f.original || null;
      if(!url) return f;
      const b64 = await imgToBase64(url);
      return { ...f, url: b64 || url };
    })
  );
  return converted;
}

// ── RENDER ──────────────────────────────────────
let _propData = null; // store for PDF generation

function renderFicha(p){
  _propData = p;
  const id      = p.public_id || p.id || '';
  const titulo  = p.title || p.property_type || 'Propiedad';
  const op      = p.operations?.[0];
  const tipo_op = op?.type === 'sale' ? 'EN VENTA' : op?.type === 'rental' ? 'EN RENTA' : 'EN VENTA';
  const precio  = op ? `${fmt(op.amount)} ${op.currency||'MXN'}` : '—';
  const ciudad  = p.location?.city || '';
  const colonia = p.location?.name || '';
  const dir     = p.address || '';
  const ubic    = [colonia,ciudad].filter(Boolean).join(', ') || dir || '—';
  const rec     = p.bedrooms;
  const ban     = p.bathrooms;
  const mban    = p.half_bathrooms;
  const m2c     = p.construction_size;
  const m2t     = p.lot_size;
  const parking = p.parking_spaces;
  const pisos   = p.floors;
  const edad    = p.age;
  const desc    = (p.description||'').replace(/<[^>]*>/g,'').trim();
  const amenids = p.amenities || [];
  const fotos   = p.property_images || [];
  const tipo_inm= p.property_type || '';

  // ── BUILD SPECS ──
  const specs = [];
  if(rec)     specs.push({ico:'🛏',val:rec,lbl:'Recámaras'});
  if(ban)     specs.push({ico:'🚿',val:ban,lbl:'Baños'});
  if(m2c)     specs.push({ico:'📐',val:m2c,lbl:'m² Const.'});
  if(m2t)     specs.push({ico:'🌿',val:m2t,lbl:'m² Terreno'});
  if(parking && specs.length<4) specs.push({ico:'🚗',val:parking,lbl:'Estacion.'});

  const specsHTML = specs.length ? `<div class="cover-specs">
    ${specs.slice(0,4).map(s=>`<div class="spec-item">
      <div class="spec-ico">${s.ico}</div>
      <div class="spec-val">${s.val}</div>
      <div class="spec-lbl">${s.lbl}</div>
    </div>`).join('')}
  </div>` : '';

  // ── HERO PHOTO ──
  const hero = fotos[0]?.url || fotos[0]?.original || null;
  const heroHTML = hero
    ? `<img class="cover-hero" src="${hero}" alt="portada"/>`
    : `<div class="cover-hero-placeholder"></div>`;

  // ── PAGE 1: PORTADA ──
  let pages = `
  <div class="ficha-page">
    ${heroHTML}
    <div class="cover-info">
      <div class="cover-badge">${tipo_op}</div>
      <div class="cover-precio">${precio}</div>
      <div class="cover-titulo">${titulo}</div>
      <div class="cover-ubicacion">
        <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        ${ubic}
      </div>
    </div>
    ${specsHTML}
    ${desc ? `<div class="cover-desc-wrap">
      <div class="cover-desc-ttl">Descripción</div>
      <div class="cover-desc">${desc}</div>
    </div>` : '<div style="flex:1"></div>'}
    ${footer(id)}
  </div>`;

  // ── GALLERY PAGES (6 fotos per page) ──
  const galleryFotos = fotos.slice(1).map(f=>f.url||f.original).filter(Boolean);
  for(let i=0; i<galleryFotos.length; i+=6){
    const batch = galleryFotos.slice(i, i+6);
    // Pad to 6 if needed for grid
    while(batch.length < 6) batch.push(null);
    pages += `
    <div class="ficha-page">
      <div class="gallery-header"><h2>Galería fotográfica</h2></div>
      <div class="photo-grid">
        ${batch.map(src => src
          ? `<img src="${src}" alt="foto"/>`
          : `<div style="background:var(--gray)"></div>`
        ).join('')}
      </div>
      ${footer(id)}
    </div>`;
  }

  // ── CHARACTERISTICS TABLE ──
  const rows = [];
  if(tipo_inm) rows.push(['Tipo de inmueble', tipo_inm]);
  if(tipo_op)  rows.push(['Operación', tipo_op]);
  if(precio)   rows.push(['Precio', precio]);
  if(rec)      rows.push(['Recámaras', rec]);
  if(ban)      rows.push(['Baños completos', ban]);
  if(mban)     rows.push(['Medios baños', mban]);
  if(m2c)      rows.push(['Superficie construida', fmtM2(m2c)]);
  if(m2t)      rows.push(['Superficie de terreno', fmtM2(m2t)]);
  if(parking)  rows.push(['Estacionamientos', parking]);
  if(pisos)    rows.push(['Niveles', pisos]);
  if(edad){
    const yr = parseInt(edad);
    const now = new Date().getFullYear();
    if(yr>1900 && yr<=now){
      const diff = now - yr;
      rows.push(['Antigüedad', diff===0 ? 'Nuevo' : diff+(diff===1?' año':' años')]);
    } else {
      rows.push(['Antigüedad', edad+' años']);
    }
  }
  if(colonia)  rows.push(['Colonia', colonia]);
  if(ciudad)   rows.push(['Ciudad', ciudad]);
  if(id)       rows.push(['Clave', id]);

  const amenHTML = amenids.length ? `
    <div class="amen-section">
      <div class="amen-ttl">Amenidades</div>
      <div class="amen-grid">${amenids.map(a=>`<div class="amen-item">${a.name||a}</div>`).join('')}</div>
    </div>` : '';

  pages += `
  <div class="ficha-page">
    <div class="chars-header"><h2>Características del inmueble</h2></div>
    <div class="chars-body">
      <table class="char-table">
        <tbody>
          ${rows.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
        </tbody>
      </table>
      ${amenHTML}
    </div>
    ${footer(id)}
  </div>`;

  const el = g('ficha');
  el.innerHTML = pages;
  el.classList.add('show');
  g('print-bar').classList.add('show');
  el.scrollIntoView({behavior:'smooth', block:'start'});
}


// ── DESCARGA PDF VÍA RAILWAY ─────────────────────────────────
async function descargarPDF(){
  if(!_propData){ alert('Genera primero la ficha.'); return; }
  const btn = document.getElementById('pdf-btn');
  const txt = document.getElementById('print-bar-txt');
  const id  = _propData.public_id || _propData.id || 'ficha';
  const filename = 'BROKR_' + id + '.pdf';
  btn.disabled = true;
  btn.innerHTML = '&#9203; Generando PDF...';
  txt.textContent = 'Preparando tu ficha...';
  let blob = null;
  try{
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 120000);
    const res = await fetch(API + '/ficha-pdf', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(_propData),
      signal: controller.signal
    });
    clearTimeout(timeout);
    if(!res.ok) throw new Error('Error servidor: ' + res.status);
    blob = await res.blob();
  } catch(e){
    if(e.name === 'AbortError') alert('Tiempo agotado. Intenta de nuevo.');
    else alert('Error generando PDF: ' + e.message);
    txt.textContent = 'Ficha lista';
    btn.disabled = false;
    btn.innerHTML = '&#11015; Descargar / Compartir PDF';
    return;
  }

  // PDF ready — now deliver it
  const file = new File([blob], filename, {type:'application/pdf'});
  const canShare = navigator.share && navigator.canShare && navigator.canShare({files:[file]});

  if(canShare){
    // iOS Safari — native share sheet (WhatsApp, Files, Mail, etc.)
    navigator.share({title:'Ficha ' + id, files:[file]})
      .then(() => { txt.textContent = '&#10003; Listo'; })
      .catch((err) => {
        // User cancelled or share failed — fallback to object URL open
        if(err.name !== 'AbortError'){
          const url = URL.createObjectURL(blob);
          window.open(url, '_blank');
        }
        txt.textContent = 'Ficha lista';
      })
      .finally(() => {
        btn.disabled = false;
        btn.innerHTML = '&#11015; Descargar / Compartir PDF';
      });
  } else {
    // Desktop or browser without share API
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 3000);
    txt.textContent = '&#10003; PDF descargado';
    btn.disabled = false;
    btn.innerHTML = '&#11015; Descargar / Compartir PDF';
  }
}

// ── FETCH ────────────────────────────────────────
async function generarFicha(){
  hideError();
  const id = g('prop-id').value.trim().toUpperCase();
  if(!id){ showError('Ingresa el ID de la propiedad.'); return; }
  setLoading(true,'Consultando EasyBroker...');
  try{
    // Obtener API key del usuario desde localStorage o perfil
    const ebKey = (window.parent?.userProfile?.eb_api_key) || localStorage.getItem('eb_api_key') || '';
    const fetchHeaders = ebKey ? { 'X-EB-Key': ebKey } : {};
    const res = await fetch(`${API}/propiedad/${encodeURIComponent(id)}`, { headers: fetchHeaders });
    if(!res.ok){
      let d='Error al consultar la propiedad';
      try{const j=await res.json();d=j.detail||d;}catch(e){}
      throw new Error(d);
    }
    const p = await res.json();
    setLoading(false, 'Optimizando imágenes para PDF...');
    // Convert images to base64 for reliable PDF printing on all devices
    if(p.property_images && p.property_images.length) {
      setLoading(true, 'Preparando ' + p.property_images.length + ' fotos...');
      p.property_images = await convertAllImages(p.property_images);
    }
    setLoading(false);
    renderFicha(p);
  } catch(e){
    setLoading(false);
    showError(e.message||'Error desconocido');
  }
}
