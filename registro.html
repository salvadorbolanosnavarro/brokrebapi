<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Brokr — Completa tu perfil</title>
<link rel="apple-touch-icon" href="icon-192.png"/>
<meta name="theme-color" content="#0a1628"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0a1628;--navy2:#0f1f3d;--teal:#0d9488;--teal2:#14b8a6;--white:#fff;--muted:#94a3b8;--border:#1e3058;--input-bg:#0d1f3a;--radius:12px}
html,body{min-height:100%;background:var(--navy);font-family:'DM Sans',sans-serif;color:var(--white)}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(13,148,136,.15) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(59,111,212,.12) 0%,transparent 60%),var(--navy)}
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.card{width:100%;max-width:460px;background:rgba(10,22,40,.85);border:1px solid var(--border);border-radius:20px;padding:40px 36px 36px;backdrop-filter:blur(20px);box-shadow:0 32px 80px rgba(0,0,0,.5);animation:cardIn .5s cubic-bezier(.16,1,.3,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.logo-area{text-align:center;margin-bottom:32px}
.logo-area img{height:40px}
.logo-area h2{font-family:'DM Serif Display',serif;font-size:22px;margin-top:12px;color:var(--white)}
.logo-area p{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.field input{width:100%;padding:12px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--white);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.15)}
.field input::placeholder{color:#3d5a80}
.field .hint{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.4}
.btn-primary{width:100%;padding:14px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--teal),var(--teal2));color:var(--white);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:8px}
.btn-primary:hover{opacity:.9}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;line-height:1.5}
.msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;display:block}
.msg.ok{background:rgba(13,148,136,.1);border:1px solid rgba(13,148,136,.3);color:#5eead4;display:block}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="card">
    <div class="logo-area">
      <img src="icon-192.png" alt="Brokr"/>
      <h2>Completa tu perfil</h2>
      <p>Solo necesitamos un par de datos para personalizar tu experiencia.</p>
    </div>

    <div class="msg" id="msg"></div>

    <div class="field">
      <label>Nombre completo</label>
      <input type="text" id="r-nombre" placeholder="Ej. Salvador Bolaños Navarro" autocomplete="name"/>
    </div>
    <div class="field">
      <label>Teléfono</label>
      <input type="tel" id="r-telefono" placeholder="Ej. 443 123 4567" autocomplete="tel"/>
      <div class="hint">Lo usaremos solo para soporte técnico.</div>
    </div>

    <button class="btn-primary" id="btn-save" onclick="guardar()">Continuar a Brokr</button>
  </div>
</div>

<script>
const SB_URL = 'https://urtgysmtnvoqaljuhntz.supabase.co';
const SB_KEY = 'sb_publishable_EVGLfmHVorBpQQWAh-vypA_hANNk_-i';

function showMsg(t,type='err'){const e=document.getElementById('msg');e.textContent=t;e.className=`msg ${type}`}

async function guardar(){
  const nombre   = document.getElementById('r-nombre').value.trim();
  const telefono = document.getElementById('r-telefono').value.trim();
  if(!nombre){ showMsg('Ingresa tu nombre'); return; }

  const token = sessionStorage.getItem('sb_token');
  const user  = JSON.parse(sessionStorage.getItem('sb_user') || '{}');
  if(!token || !user.id){ window.location.href = 'login.html'; return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';

  const isAdmin = user.email === 'salvadorbolanosnavarro@gmail.com';
  const planDefault = isAdmin ? 'admin' : 'free';
  const modulosDefault = isAdmin
    ? ['chat','isr','ficha-manual','ficha','contratos','avm']
    : ['ficha-manual'];

  // Use UPSERT — single call, handles both insert and update
  const r = await fetch(`${SB_URL}/rest/v1/usuarios`, {
    method: 'POST',
    headers:{
      'apikey': SB_KEY,
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
      'Prefer': 'resolution=merge-duplicates,return=minimal'
    },
    body: JSON.stringify({
      id: user.id,
      email: user.email,
      nombre,
      telefono,
      plan: planDefault,
      modulos: modulosDefault,
      updated_at: new Date().toISOString()
    })
  });

  if(!r.ok){
    const errText = await r.text();
    console.error('Supabase error:', r.status, errText);
    showMsg(`Error ${r.status}: ${errText}`);
    btn.disabled=false;
    btn.textContent='Continuar a Brokr';
    return;
  }

  showMsg('Perfil guardado. Cargando Brokr…', 'ok');
  setTimeout(() => { window.location.href = 'index.html'; }, 800);
}

// Redirect if not logged in
if(!sessionStorage.getItem('sb_token')) window.location.href = 'login.html';
</script>
</body>
</html>
