<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brokr — Ficha Manual</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0f1829;--navy2:#1a2744;--teal:#2a9db5;--gold:#c9a84c;
  --white:#ffffff;--gray:#f5f6f8;--gray2:#e8ecf2;--txt:#1a2744;--mut:#6b7a99;--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f0f2f5;color:var(--txt)}

/* ── APP UI ── */
#app-ui{max-width:680px;margin:0 auto;padding:24px 20px 60px}
.ui-logo{margin-bottom:24px}
.ui-logo img{height:26px;width:auto}
.ui-card{background:var(--white);border-radius:var(--r);padding:20px 24px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:14px}
.ui-card h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--teal);margin-bottom:14px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.frow.three{grid-template-columns:1fr 1fr 1fr}
.frow.single{grid-template-columns:1fr}
.f{display:flex;flex-direction:column;gap:4px}
.f label{font-size:11px;font-weight:600;color:var(--mut)}
.f input,.f select,.f textarea{
  padding:9px 12px;border:1.5px solid var(--gray2);border-radius:8px;
  font-size:13px;font-family:'DM Sans',sans-serif;color:var(--txt);
  outline:none;transition:border-color .15s;background:var(--white);
}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--teal)}
.f textarea{resize:vertical;min-height:80px}

/* price row */
#precio-renta-row{display:none}

/* foto upload */
.foto-upload-area{
  border:2px dashed var(--gray2);border-radius:10px;
  padding:20px;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;
  background:var(--gray);
}
.foto-upload-area:hover{border-color:var(--teal);background:#f0fbfd}
.foto-upload-area p{font-size:13px;color:var(--mut);margin-top:8px}
.foto-upload-area svg{opacity:.4}
#photos-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;
}
.photo-thumb{
  position:relative;border-radius:8px;overflow:hidden;
  aspect-ratio:1;cursor:grab;border:2px solid transparent;
  transition:border-color .15s;
}
.photo-thumb.drag-over{border-color:var(--teal)}
.photo-thumb.dragging{opacity:.5}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.photo-main-badge{
  position:absolute;bottom:4px;left:4px;
  background:var(--gold);color:white;font-size:9px;font-weight:700;
  padding:2px 7px;border-radius:10px;letter-spacing:.3px;
}
.photo-del{
  position:absolute;top:4px;right:4px;
  background:rgba(0,0,0,.55);color:white;border:none;
  width:20px;height:20px;border-radius:50%;font-size:13px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;
}
#drag-hint{
  display:none;font-size:11px;color:var(--mut);text-align:center;
  margin-top:6px;
}
#drag-hint.show{display:block}

/* AI desc button */
.ai-btn{
  display:flex;align-items:center;gap:6px;padding:8px 14px;
  background:linear-gradient(135deg,var(--teal),#1f8ba0);
  color:white;border:none;border-radius:8px;font-size:12px;
  font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;
  margin-top:8px;
}
.ai-btn:hover{opacity:.9}
.ai-hint{font-size:11px;color:var(--mut);margin-top:6px}

/* action buttons */
.actions{display:flex;gap:10px;margin-top:4px}
.ui-btn{
  display:flex;align-items:center;gap:7px;padding:12px 24px;
  background:var(--navy);color:white;border:none;border-radius:10px;
  font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;
}
.ui-btn:hover{background:var(--navy2)}
.ui-btn.teal{background:var(--teal)}
.ui-btn.teal:hover{background:#1f8ba0}
.ui-btn.outline{background:transparent;border:1.5px solid var(--gray2);color:var(--navy)}
.ui-btn.outline:hover{background:var(--gray)}

#print-bar{
  display:none;background:var(--white);border-radius:var(--r);
  padding:14px 20px;box-shadow:0 2px 12px rgba(0,0,0,.06);
  margin-bottom:14px;flex-direction:row;align-items:center;
  justify-content:space-between;gap:12px;
}
#print-bar.show{display:flex}
#print-bar span{font-size:13px;color:var(--mut)}

/* ── FICHA PAGES ── */
#ficha{display:none;margin-bottom:40px}
#ficha.show{display:block}
#ficha-pages{}

.ficha-page{
  width:210mm;background:var(--white);margin:0 auto 24px;
  box-shadow:0 4px 32px rgba(0,0,0,.10);
  display:flex;flex-direction:column;overflow:hidden;
}
.cover-hero{width:100%;height:110mm;object-fit:cover;display:block;flex-shrink:0}
.cover-hero-placeholder{
  width:100%;height:110mm;
  background:linear-gradient(135deg,var(--navy),var(--navy2));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.cover-info{padding:18px 24px 14px;border-bottom:1px solid var(--gray2)}
.cover-badge{
  display:inline-block;background:var(--gold);color:white;
  font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  padding:4px 10px;border-radius:20px;margin-bottom:10px;
}
.cover-precio{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--navy);line-height:1;margin-bottom:6px}
.cover-titulo{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:4px}
.cover-ubicacion{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:4px}
.cover-specs{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--gray2)}
.spec-item{padding:12px 16px;text-align:center;border-right:1px solid var(--gray2)}
.spec-item:last-child{border-right:none}
.spec-ico{font-size:18px;margin-bottom:3px}
.spec-val{font-size:16px;font-weight:700;color:var(--navy);line-height:1.1}
.spec-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-top:2px}
.cover-desc-wrap{padding:16px 24px;flex:1}
.cover-desc-ttl{
  font-family:'Playfair Display',serif;font-size:13px;font-weight:600;
  color:var(--navy);margin-bottom:8px;padding-bottom:6px;
  border-bottom:2px solid var(--teal);display:inline-block;
}
.cover-desc{font-size:11.5px;color:#444;line-height:1.65}
.gallery-header{padding:16px 24px 12px;border-bottom:1px solid var(--gray2)}
.gallery-header h2{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--navy)}
.photo-grid{
  display:grid;grid-template-columns:1fr 1fr;
  grid-template-rows:repeat(3,1fr);gap:3px;flex:1;padding:3px;min-height:0;
}
.photo-grid img{width:100%;height:100%;object-fit:cover;display:block}
.chars-header{padding:18px 24px 14px;border-bottom:1px solid var(--gray2)}
.chars-header h2{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--navy)}
.chars-body{padding:16px 24px;flex:1}
.char-table{width:100%;border-collapse:collapse}
.char-table tr{border-bottom:1px solid var(--gray2)}
.char-table tr:last-child{border-bottom:none}
.char-table td{padding:8px 12px;font-size:12px;vertical-align:middle}
.char-table td:first-child{color:var(--mut);width:42%}
.char-table td:last-child{color:var(--navy);font-weight:600;text-align:right}
.char-table tr:nth-child(even) td{background:var(--gray)}
.amen-section{margin-top:16px}
.amen-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--teal);margin-bottom:8px}
.amen-grid{display:flex;flex-wrap:wrap;gap:6px}
.amen-item{font-size:11px;padding:5px 10px;background:var(--gray);border-radius:20px;color:var(--navy);border:1px solid var(--gray2)}
.ficha-footer{
  width:100%;height:40px;background:var(--navy);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;flex-shrink:0;
}
.ft-logo img{height:16px;filter:brightness(10)}
.ft-txt{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.5px}

/* ── PRINT ── */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  html,body{margin:0;padding:0;background:white}
  #app-ui{display:none!important}
  #ficha{display:block!important;margin:0!important}
  .ficha-page{
    width:210mm!important;height:297mm!important;
    margin:0!important;padding:0!important;box-shadow:none!important;
    page-break-after:always!important;page-break-inside:avoid!important;
    display:flex!important;flex-direction:column!important;overflow:hidden!important;
  }
  .ficha-page:last-child{page-break-after:avoid!important}
  .cover-hero,.cover-hero-placeholder{height:110mm!important;flex-shrink:0!important}
  .photo-grid{flex:1!important;min-height:0!important}
  .photo-grid img{width:100%!important;height:100%!important;object-fit:cover!important}
  .chars-body,.cover-desc-wrap{flex:1!important}
  .ficha-footer{height:40px!important;flex-shrink:0!important;background:var(--navy)!important}
  .ft-logo img{filter:brightness(10)!important}
  @page{size:A4 portrait;margin:0}
}
@media(max-width:768px){
  #app-ui{padding:16px 14px 40px}
  .frow,.frow.three{grid-template-columns:1fr}
  #photos-grid{grid-template-columns:repeat(3,1fr)}
  .ficha-page{width:100%;margin-bottom:12px}
  .cover-hero,.cover-hero-placeholder{height:55vw}
  .cover-specs{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

function propFmtMoney(input){
  const raw = getRawNum(input.value);
  if(!raw){ input.value = ''; return; }
  input.value = '$' + raw.toLocaleString('es-MX', {minimumFractionDigits:0,maximumFractionDigits:0});
}



// ── FOTOS ────────────────────────────────────
let fotos = []; // {url, name}

// ── PRICE FORMATTING ──
function onOpChange(){
  const op = document.getElementById('d-op').value;
  const rentaWrap = document.getElementById('precio-renta-wrap');
  const lbl = document.getElementById('precio-lbl');
  if(op === 'Venta y renta'){
    rentaWrap.style.display = 'block';
    lbl.textContent = 'Precio en venta (MXN)';
  } else {
    rentaWrap.style.display = 'none';
    lbl.textContent = 'Precio (MXN)';
  }
}

function getRawNum(val){
  // Strip commas and decimals safely — only integer part
  return parseInt(val.split('.')[0].replace(/[^0-9]/g, '') || '0', 10);
}

function fmtInput(input){
  const n = getRawNum(input.value);
  if(!n){ input.value = ''; return; }
  input.value = n.toLocaleString('en-US');
}

function fmtInputBlur(input){
  const n = getRawNum(input.value);
  if(!n){ input.value = ''; return; }
  input.value = n.toLocaleString('en-US') + '.00';
}

// Keep old names for backward compat
function fmtPrecio(input){ fmtInput(input); }
function fmtPrecioBlur(input){ fmtInputBlur(input); }

function getPrecioFormateado(fieldId){
  const id = fieldId || 'd-precio';
  const n = getRawNum(document.getElementById(id)?.value || '');
  if(!n) return '';
  return '$' + n.toLocaleString('en-US') + '.00';
}

// ── PHOTOS ──
function addPhotos(input){
  const files = Array.from(input.files || input);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      fotos.push({ url: e.target.result, name: file.name });
      renderThumbs();
    };
    reader.readAsDataURL(file);
  });
  input.value = ''; // reset so same file can be added again
}

function renderThumbs(){
  const grid = document.getElementById('photos-grid');
  grid.innerHTML = fotos.map((f,i) => `
    <div class="photo-thumb" draggable="true" data-idx="${i}"
      ondragstart="dragStart(event,${i})"
      ondragover="dragOver(event,${i})"
      ondrop="dragDrop(event,${i})"
      ondragend="dragEnd(event)">
      <img src="${f.url}" alt="foto ${i+1}"/>
      ${i===0 ? '<div class="photo-main-badge">Portada</div>' : ''}
      <button class="photo-del" onclick="deletePhoto(${i})">×</button>
    </div>`).join('');
  const hint = document.getElementById('drag-hint');
  if(hint) hint.classList[fotos.length > 1 ? 'add' : 'remove']('show');
}

let dragSrcIdx = null;

function dragStart(e, idx){
  dragSrcIdx = idx;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function dragOver(e, idx){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.photo-thumb').forEach(el => el.classList.remove('drag-over'));
  if(idx !== dragSrcIdx) e.currentTarget.classList.add('drag-over');
}

function dragDrop(e, idx){
  e.preventDefault();
  if(dragSrcIdx === null || dragSrcIdx === idx) return;
  // Reorder
  const moved = fotos.splice(dragSrcIdx, 1)[0];
  fotos.splice(idx, 0, moved);
  renderThumbs();
}

function dragEnd(e){
  document.querySelectorAll('.photo-thumb').forEach(el => {
    el.classList.remove('dragging','drag-over');
  });
  dragSrcIdx = null;
}



// Drag & drop (safe — zone may not exist on load)
function initDragDrop(){
  const zone = document.getElementById('foto-upload-area');
  if(!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor='var(--teal)'; });
  zone.addEventListener('dragleave', () => { zone.style.borderColor=''; });
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.style.borderColor = '';
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    addPhotos({ files });
  });
}
document.addEventListener('DOMContentLoaded', initDragDrop);


function deletePhoto(i){
  fotos.splice(i,1);
  renderThumbs();
}


// ── GET DATA ──
function g(id){ return document.getElementById(id); }
function gv(id){ return g(id)?.value?.trim() || ''; }


// ── AI DESCRIPCIÓN ───────────────────────────
async function generarDescripcion(){
  // Get elements — use querySelector as fallback
  const btn  = document.getElementById('ai-btn') || document.querySelector('.ai-btn');
  const hint = document.getElementById('ai-hint') || document.querySelector('.ai-hint');
  const desc = document.getElementById('d-desc');

  if(!desc){ alert('ERROR: campo descripción no encontrado'); return; }

  if(btn){ btn.disabled = true; btn.textContent = '⏳ Generando...'; }
  if(hint){ hint.textContent = 'Conectando con IA...'; hint.style.color = 'var(--mut)'; }

  const datos = getDatos();
  const lineas = [
    datos.tipo    ? '- Tipo: '           + datos.tipo    : '',
    datos.op      ? '- Operación: '      + datos.op      : '',
    datos.colonia ? '- Colonia: '        + datos.colonia + ', ' + datos.ciudad : '- Ciudad: ' + datos.ciudad,
    datos.rec     ? '- Recámaras: '      + datos.rec     : '',
    datos.ban     ? '- Baños: '          + datos.ban     : '',
    datos.m2c     ? '- Construcción: '   + datos.m2c + ' m²' : '',
    datos.m2t     ? '- Terreno: '        + datos.m2t + ' m²' : '',
    datos.est     ? '- Estacionamientos: '+ datos.est    : '',
    datos.anio    ? '- Año: '            + datos.anio    : '',
    datos.amen    ? '- Amenidades: '     + datos.amen    : '',
  ].filter(Boolean).join('\n');

  const prompt = 'Eres un agente inmobiliario experto en Morelia, Michoacán. Redacta una descripción comercial atractiva y profesional para esta propiedad. Máximo 180 palabras. Sin emojis. Sin mencionar precio.\n\nDatos:\n' + lineas + '\n\nRedacta solo la descripción:';

  try{
    const r = await fetch(API + '/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        messages: [{role:'user', content: prompt}],
        max_tokens: 400,
        temperature: 0.7
      })
    });
    const txt = await r.text();
    if(!r.ok) throw new Error('Error ' + r.status + ': ' + txt);
    let data;
    try{ data = JSON.parse(txt); } catch(e){ throw new Error('Respuesta inválida: ' + txt.slice(0,100)); }
    const respuesta = data.choices?.[0]?.message?.content
                   || data.content
                   || data.text
                   || '';
    if(!respuesta) throw new Error('Sin contenido: ' + JSON.stringify(data).slice(0,100));
    desc.value = respuesta.trim();
    if(hint){ hint.textContent = '✓ Descripción generada — puedes editarla.'; hint.style.color = 'var(--teal)'; }
  } catch(e){
    console.error(e);
    const msg = 'Error: ' + e.message;
    if(hint){ hint.textContent = msg; hint.style.color = '#c00'; }
    else alert(msg);
  } finally{
    if(btn){ btn.disabled = false; btn.textContent = '✨ Generar con IA'; }
  }
}

// ── FOOTER ──────────────────────────────────
function footer(){
  return `<div class="ficha-footer">
    <div class="ft-logo" style="display:flex;align-items:center;gap:6px">
      <span style="font-size:9px;color:rgba(255,255,255,.6);font-weight:500;letter-spacing:.3px">Powered by</span>
      <img src="logotipo-brokr.svg" alt="Shaark"/>
    </div>
    <div class="ft-txt">BROKR.MX</div>
  </div>`;
}

// ── BUILD FICHA PAGES ────────────────────────
function buildFichaPages(d){
  const specs = [];
  if(d.rec)  specs.push({ico:'🛏',val:d.rec,lbl:'Recámaras'});
  if(d.ban)  specs.push({ico:'🚿',val:d.ban,lbl:'Baños'});
  if(d.m2c)  specs.push({ico:'📐',val:d.m2c+' m²',lbl:'Construcción'});
  if(d.m2t)  specs.push({ico:'🌿',val:d.m2t+' m²',lbl:'Terreno'});
  if(d.est && specs.length<4) specs.push({ico:'🚗',val:d.est,lbl:'Estacion.'});

  const specsHTML = specs.length ? `<div class="cover-specs">
    ${specs.slice(0,4).map(s=>`<div class="spec-item">
      <div class="spec-ico">${s.ico}</div>
      <div class="spec-val">${s.val}</div>
      <div class="spec-lbl">${s.lbl}</div>
    </div>`).join('')}
  </div>` : '';

  const ubicacion = [d.colonia, d.ciudad].filter(Boolean).join(', ') || 'Morelia, Michoacán';
  const titulo = [d.tipo, d.op ? `en ${d.op}` : ''].filter(Boolean).join(' ') || 'Propiedad';
  const heroSrc = fotos[0]?.url || null;
  const heroHTML = heroSrc
    ? `<img class="cover-hero" src="${heroSrc}" alt="portada"/>`
    : `<div class="cover-hero-placeholder"></div>`;

  // PAGE 1: PORTADA
  let pages = `
  <div class="ficha-page">
    ${heroHTML}
    <div class="cover-info">
      <div class="cover-badge">${d.op.toUpperCase()}</div>
      <div class="cover-precio">${d.precio || '—'}</div>
      <div class="cover-titulo">${titulo}</div>
      <div class="cover-ubicacion">
        <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        ${ubicacion}
      </div>
    </div>
    ${specsHTML}
    ${d.desc ? `<div class="cover-desc-wrap"><div class="cover-desc-ttl">Descripción</div><div class="cover-desc">${d.desc}</div></div>` : '<div style="flex:1"></div>'}
    ${footer()}
  </div>`;

  // GALLERY PAGES (6 per page)
  const galleryFotos = fotos.slice(1).map(f=>f.url).filter(Boolean);
  for(let i=0; i<galleryFotos.length; i+=6){
    const batch = galleryFotos.slice(i,i+6);
    while(batch.length < 6) batch.push(null);
    pages += `
    <div class="ficha-page">
      <div class="gallery-header"><h2>Galería fotográfica</h2></div>
      <div class="photo-grid">
        ${batch.map(src => src
          ? `<img src="${src}" alt="foto"/>`
          : `<div style="background:var(--gray)"></div>`
        ).join('')}
      </div>
      ${footer()}
    </div>`;
  }

  // CARACTERÍSTICAS PAGE
  const rows = [];
  if(d.tipo)   rows.push(['Tipo de inmueble', d.tipo]);
  if(d.op)     rows.push(['Operación', d.op]);
  if(d.precio) rows.push(['Precio', d.precio]);
  if(d.rec)    rows.push(['Recámaras', d.rec]);
  if(d.ban)    rows.push(['Baños completos', d.ban]);
  if(d.mban)   rows.push(['Medios baños', d.mban]);
  if(d.m2c)    rows.push(['Superficie construida', d.m2c+' m²']);
  if(d.m2t)    rows.push(['Superficie de terreno', d.m2t+' m²']);
  if(d.est)    rows.push(['Estacionamientos', d.est]);
  if(d.niv)    rows.push(['Niveles', d.niv]);
  if(d.anio)   rows.push(['Año de construcción', d.anio]);
  if(d.colonia) rows.push(['Colonia', d.colonia]);
  if(d.ciudad)  rows.push(['Ciudad', d.ciudad]);
  if(d.dir)     rows.push(['Dirección', d.dir]);

  const amenList = d.amen ? d.amen.split(',').map(a=>a.trim()).filter(Boolean) : [];
  const amenHTML = amenList.length ? `
    <div class="amen-section">
      <div class="amen-ttl">Amenidades</div>
      <div class="amen-grid">${amenList.map(a=>`<div class="amen-item">${a}</div>`).join('')}</div>
    </div>` : '';

  pages += `
  <div class="ficha-page">
    <div class="chars-header"><h2>Características del inmueble</h2></div>
    <div class="chars-body">
      <table class="char-table"><tbody>
        ${rows.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
      </tbody></table>
      ${amenHTML}
    </div>
    ${footer()}
  </div>`;

  return pages;
}

// ── GENERAR ──────────────────────────────────
function getDatos(){
  return {
    tipo:    gv('d-tipo'),
    op:      gv('d-op'),
    precio:  getPrecioFormateado('d-precio'),
    precioRenta: document.getElementById('d-op')?.value === 'Venta y renta'
                 ? getPrecioFormateado('d-precio-renta') : '',
    colonia: gv('d-colonia'),
    ciudad:  gv('d-ciudad') || 'Morelia',
    dir:     gv('d-dir'),
    rec:     gv('d-rec'),
    ban:     gv('d-ban'),
    mban:    gv('d-mban'),
    m2c:     gv('d-m2c'),
    m2t:     gv('d-m2t'),
    est:     gv('d-est'),
    niv:     gv('d-niv'),
    anio:    gv('d-anio'),
    desc:    gv('d-desc'),
    amen:    gv('d-amen'),
  };
}


let _lastPdfToken = null;
let _lastPdfFilename = 'Ficha_Brokr.pdf';

function _descargarBlob(url, filename){
  // PWA-compatible download: fetch as blob then trigger anchor download
  fetch(url)
    .then(r => r.blob())
    .then(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename || 'Ficha_Brokr.pdf';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
    })
    .catch(() => {
      // fallback: open in new tab if blob fails (desktop)
      window.open(url, '_blank');
    });
}

function abrirPDF(){
  if(!_lastPdfToken){ alert('Genera primero la ficha.'); return; }
  _descargarBlob(API + '/ficha-pdf/' + _lastPdfToken, _lastPdfFilename);
}
async function generarFicha(){
  const d = getDatos();
  if(!fotos.length && !d.titulo && !d.colonia){
    alert('Agrega al menos una foto y los datos básicos de la propiedad.');
    return;
  }
  const btn = document.querySelector('.ui-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Generando ficha...';
  try{
    // Build property data in EasyBroker-compatible format
    const rawNum = (v) => parseFloat((v||'').replace(/[$,]/g,'').trim()) || null;
    const propData = {
      id: null,
      public_id: null,
      title: [d.tipo, d.op ? 'en ' + d.op : ''].filter(Boolean).join(' ') || 'Propiedad',
      property_type: d.tipo || 'Propiedad',
      description: d.desc || '',
      operations: d.precio ? [{
        type: d.op === 'Renta' ? 'rental' : 'sale',
        amount: rawNum(d.precio),
        currency: 'MXN'
      }] : [],
      location: { name: d.colonia || '', city: d.ciudad || 'Morelia' },
      address: d.dir || '',
      bedrooms: d.rec ? parseFloat(d.rec) : null,
      bathrooms: d.ban ? parseFloat(d.ban) : null,
      half_bathrooms: d.mban ? parseFloat(d.mban) : null,
      construction_size: d.m2c ? parseFloat(d.m2c) : null,
      lot_size: d.m2t ? parseFloat(d.m2t) : null,
      parking_spaces: d.est ? parseFloat(d.est) : null,
      floors: d.niv ? parseFloat(d.niv) : null,
      age: d.anio || null,
      amenities: d.amen ? d.amen.split(',').map(a=>({name:a.trim()})).filter(a=>a.name) : [],
      property_images: fotos.map(f => ({ url: f.url, original: f.url }))
    };

    const res = await fetch(API + '/ficha-pdf', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(propData)
    });
    if(!res.ok) throw new Error('Error servidor: ' + res.status);
    const data = await res.json();
    _lastPdfToken = data.token;
    _lastPdfFilename = data.filename || 'Ficha_Brokr.pdf';
    g('print-bar').classList.add('show');
    document.getElementById('print-bar-txt').textContent = '✓ Ficha lista — presiona Descargar para guardar';
  } catch(e){
    alert('Error generando ficha: ' + e.message);
  } finally{
    btn.disabled = false;
    btn.textContent = 'Generar ficha';
  }
}
